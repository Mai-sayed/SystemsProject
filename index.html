/* ═══════════════════════════════════════════════
   AST RENDERER
═══════════════════════════════════════════════ */
const { useState, useCallback, useRef, useEffect } = React;

function ASTNode({ node, depth=0 }) {
  const [open, setOpen] = useState(depth < 3);
  if (!node || typeof node !== 'object') return null;
  const children = [];
  for (const [k, v] of Object.entries(node)) {
    if (k === 'type') continue;
    if (Array.isArray(v)) children.push({ k, v: v.filter(x=>x&&typeof x==='object') });
    else if (v && typeof v === 'object') children.push({ k, v });
  }
  const hasChildren = children.length > 0;
  return (
    <div className="ast-node">
      <div className="ast-node-label" onClick={()=>setOpen(o=>!o)}>
        <span className="ast-toggle">{hasChildren ? (open?'▾':'▸') : '·'}</span>
        <span className="ast-node-type">{node.type}</span>
        {node.name  && <span className="ast-node-val"> {node.name}</span>}
        {node.value !== undefined && !Array.isArray(node.value) && typeof node.value !== 'object' && <span className="ast-node-val"> {String(node.value)}</span>}
        {node.op    && <span className="ast-node-info"> [{node.op}]</span>}
        {node.dataType && <span className="ast-node-info"> :{node.dataType}</span>}
      </div>
      {open && hasChildren && children.map(({k,v})=>(
        <div key={k}>
          <div style={{marginLeft:20,color:'var(--muted)',fontSize:11}}>{k}:</div>
          {Array.isArray(v)
            ? v.map((c,i)=><ASTNode key={i} node={c} depth={depth+1}/>)
            : <ASTNode node={v} depth={depth+1}/>}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function App() {
  const [src, setSrc]           = useState(SAMPLE);
  const [result, setResult]     = useState(null);
  const [activeTab, setActiveTab] = useState('tokens');
  const [activePhase, setActivePhase] = useState(null);
  const [showCFG, setShowCFG]   = useState(false);
  const [running, setRunning]   = useState(false);
  const taRef = useRef(null);

  const lineCount = src.split('\n').length;

  const compile = useCallback(() => {
    setRunning(true);
    setActivePhase('lex');
    
    // Set a timeout to prevent infinite loops
    const timeoutId = setTimeout(() => {
      setResult({ fatalError: 'Compilation timeout - code too complex or infinite loop detected' });
      setRunning(false);
      setActivePhase('error');
    }, 5000);
    
    setTimeout(()=>{
      try {
        // Phase 1: Lex
        const tokens = tokenize(src);
        const lexErrors = tokenize.lastErrors || [];
        setActivePhase('parse');
        
        // Phase 2: Parse — Use Recursive Descent Parser
        const rdParser = new Parser(tokens);
        const ast    = rdParser.parseProgram();
        
        // Check for brace/paren/bracket balance (syntax errors)
        let braceCount = 0, parenCount = 0, bracketCount = 0;
        let lastBraceLine = 1, lastParenLine = 1, lastBracketLine = 1;
        for (const t of tokens) {
          if (t.value === '{') { braceCount++; lastBraceLine = t.line; }
          if (t.value === '}') { braceCount--; lastBraceLine = t.line; }
          if (t.value === '(') { parenCount++; lastParenLine = t.line; }
          if (t.value === ')') { parenCount--; lastParenLine = t.line; }
          if (t.value === '[') { bracketCount++; lastBracketLine = t.line; }
          if (t.value === ']') { bracketCount--; lastBracketLine = t.line; }
        }
        const structureErrors = [];
        if (braceCount > 0) structureErrors.push({ msg: `Syntax error: ${braceCount} unclosed '{' brace(s)`, line: lastBraceLine, col: 1 });
        if (braceCount < 0) structureErrors.push({ msg: `Syntax error: ${-braceCount} extra '}' brace(s) without matching '{'`, line: lastBraceLine, col: 1 });
        if (parenCount > 0) structureErrors.push({ msg: `Syntax error: ${parenCount} unclosed '(' parenthesis/parentheses`, line: lastParenLine, col: 1 });
        if (parenCount < 0) structureErrors.push({ msg: `Syntax error: ${-parenCount} extra ')' parenthesis without matching '('`, line: lastParenLine, col: 1 });
        if (bracketCount > 0) structureErrors.push({ msg: `Syntax error: ${bracketCount} unclosed '[' bracket(s)`, line: lastBracketLine, col: 1 });
        if (bracketCount < 0) structureErrors.push({ msg: `Syntax error: ${-bracketCount} extra ']' bracket(s) without matching '['`, line: lastBracketLine, col: 1 });
        
        const parseErrors = [...rdParser.errors, ...structureErrors];
        const hasParseErrors = parseErrors.length > 0 || lexErrors.length > 0;
        setActivePhase('sem');
        
        // Phase 3: Semantic (skip when parse or lex errors exist)
        const sem = hasParseErrors ? { includes: [], symbol_table: [], errors: [], warnings: [] } : semanticAnalysis(ast, tokens);
        setActivePhase('tac');
        
        // Phase 4: TAC - Skip when parse/lex/semantic errors exist or too many errors
        let rawTAC = [];
        let optTAC = [];
        if (!hasParseErrors && (sem.errors?.length || 0) < 20) {
          const gen    = new TACGen();
          rawTAC = gen.genProgram(ast);
          optTAC = optimizeTAC(rawTAC);
        }

        const newResult = { tokens, ast: hasParseErrors ? null : ast, derivation: rdParser.derivation, parseTable: rdParser.derivation, ...sem, rawTAC, optTAC, parseErrors, lexErrors };
        setResult(newResult);
        const hasErrorsNow = newResult.errors?.length > 0 || newResult.parseErrors?.length > 0 || newResult.lexErrors?.length > 0;
        if (hasErrorsNow) setActiveTab('errors');
        setActivePhase('done');
        clearTimeout(timeoutId);
      } catch(e) {
        clearTimeout(timeoutId);
        setResult({ fatalError: e.message });
        setActivePhase('error');
      }
      setRunning(false);
    }, 50);
  }, [src]);

  // Removed auto-compile to prevent infinite loop - compile on button click only

  const tokenClass = t => {
    switch(t.type) {
      case 'KEYWORD':  return 'tok-keyword';
      case 'TYPE':     return 'tok-type';
      case 'IDENT':    return 'tok-ident';
      case 'NUMBER':   return 'tok-literal';
      case 'STRING':   return 'tok-string';
      case 'CHAR_LIT': return 'tok-literal';
      case 'OP':       return 'tok-op';
      case 'PUNCT':    return 'tok-punct';
      case 'PREPROC':  return 'tok-preproc';
      case 'COMMENT':  return 'tok-comment';
      case 'ERROR':    return 'tok-error';
      default:         return '';
    }
  };

  const phases = [
    { id:'cfg',      icon:'📜', label:'CFG',      color:'var(--accent5)' },
    { id:'lex',      icon:'🔤', label:'Lexer',    color:'var(--accent2)' },
    { id:'parse',    icon:'🌳', label:'Parser',   color:'var(--accent3)' },
    { id:'sem',      icon:'🔍', label:'Semantic', color:'var(--accent4)' },
    { id:'tac',      icon:'⚙️', label:'TAC',      color:'var(--accent)'  },
  ];

  const hasErrors = result && (result.errors?.length > 0 || result.parseErrors?.length > 0 || result.lexErrors?.length > 0);
  const allErrors = result ? [...(result.lexErrors||[]), ...(result.parseErrors||[]), ...(result.errors||[])] : [];

  const TABS = [
    { id:'tokens',  label:'Tokens',     dot:'var(--accent2)' },
    { id:'ast',     label:'AST',        dot:'var(--accent3)' },
    { id:'deriv',   label:'Parse Table', dot:'var(--accent5)' },
    { id:'sym',     label:'Semantics',  dot:'var(--accent4)' },
    { id:'tac',     label:'TAC',        dot:'var(--accent)'  },
    { id:'errors',  label:'Errors',     dot:'var(--error)'   },
  ];

  const renderTACLine = (l, i) => {
    if (!l) return null;
    if (l.kind==='blank')  return <div key={i} style={{height:8}}/>;
    if (l.kind==='label')  return <div key={i} className="tac-label">{l.label}</div>;
    if (l.kind==='begin'||l.kind==='end') return <div key={i} style={{color:'var(--muted)',fontStyle:'italic'}}>{l.text}</div>;
    const style = l.dead ? {opacity:0.35,textDecoration:'line-through'} : l.folded ? {color:'var(--accent)'} : {};
    return <div key={i} style={style}>{l.text}{l.dead?' // dead':''}</div>;
  };

  return (
    <div className="app">
      {/* Title bar */}
      <div className="titlebar">
        <div className="titlebar-dots">
          <div className="dot red"/><div className="dot yellow"/><div className="dot green"/>
        </div>
        <div className="titlebar-name">CXX <span>Compiler</span> — Educational Suite</div>
        <div className="titlebar-right">
          {result && !hasErrors && <div className="status-chip">✓ Compiled OK</div>}
          {result && hasErrors  && <div className="status-chip" style={{borderColor:'rgba(240,90,74,0.4)',color:'var(--error)',background:'rgba(240,90,74,0.08)'}}>⚠ {allErrors.length} Error{allErrors.length>1?'s':''}</div>}
        </div>
      </div>

      {/* Phase bar */}
      <div className="phasebar">
        {phases.map((ph, idx) => (
          <React.Fragment key={ph.id}>
            <div
              className={`phase-item ${activePhase==='done'?'done':''} ${activePhase==='error'&&ph.id==='sem'?'error':''}`}
              onClick={()=> ph.id==='cfg' ? setShowCFG(true) : setActiveTab(ph.id==='tac'?'tac':ph.id==='sem'?'sym':ph.id==='parse'?'ast':ph.id==='lex'?'tokens':'tokens')}
              title={ph.id==='cfg'?'View Context-Free Grammar':'Jump to '+ph.label}
            >
              <div className="phase-icon">{ph.icon}</div>
              <span className="phase-label" style={activePhase==='done'?{color:ph.color}:{}}>{ph.label}</span>
              {running && idx===0 && <div className="phase-badge"/>}
            </div>
            {idx < phases.length-1 && <span className="phase-arrow">→</span>}
          </React.Fragment>
        ))}
        <div style={{marginLeft:'auto', display:'flex', gap:8}}>
          <button className="btn" onClick={()=>setShowCFG(true)}>📜 View CFG</button>
        </div>
      </div>

      {/* Main content */}
      <div className="main">
        {/* Editor */}
        <div className="editor-pane">
          <div className="pane-header">
            <span className="pane-title">📄 Source — C++</span>
            <div className="pane-actions">
              <button className="btn danger" onClick={()=>{setSrc('');setResult(null);setActivePhase(null);}}>Clear</button>
              <button className="btn" onClick={()=>setSrc(SAMPLE)}>Sample</button>
            </div>
          </div>
          <div className="editor-wrapper">
            <div className="line-numbers">
              {Array.from({length: lineCount}, (_,i) => (
                <div key={i} className="line-num">{i+1}</div>
              ))}
            </div>
            <textarea

              value={src}
              onChange={e=>setSrc(e.target.value)}
              spellCheck={false}
              onKeyDown={e=>{ if(e.key==='Tab'){e.preventDefault(); const s=e.target.selectionStart; setSrc(v=>v.slice(0,s)+'    '+v.slice(e.target.selectionEnd)); setTimeout(()=>{taRef.current.selectionStart=taRef.current.selectionEnd=s+4;},0);} }}

                    <tbody>
                      {result.tokens.map((t,i)=>(
                        <tr key={i}>
                          <td style={{color:'var(--muted)'}}>{i+1}</td>
                          <td><code className={tokenClass(t)}>{t.value}</code></td>
                          <td style={{color:'var(--muted)'}}>{t.type}</td>
                          <td style={{color:'var(--muted)'}}>{t.line}</td>
                          <td style={{color:'var(--muted)'}}>{t.col}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}

                {/* AST */}
                {activeTab==='ast' && (
                  <div className="ast-wrap">
                    <div className="tac-section-title">Abstract Syntax Tree (JSON view — click nodes to expand)</div>
                    <ASTNode node={result.ast} depth={0}/>
                    <div className="tac-section-title" style={{marginTop:20}}>Raw JSON</div>
                    <pre style={{fontSize:11,color:'var(--muted)',overflow:'auto',maxHeight:300}}>{JSON.stringify(result.ast,null,2)}</pre>
                  </div>
                )}

                {/* DERIVATION / PARSE TABLE */}
                {activeTab==='deriv' && (
                  <div>
                    <div className="tac-section-title">LR Parse Table — Bottom-Up Analysis (Shift-Reduce)</div>
                    {result.parseTable && result.parseTable.length===0
                      ? <div style={{color:'var(--muted)',fontSize:12}}>No parse steps recorded.</div>
                      : (
                        <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, marginBottom:16}}>
                          <thead style={{background:'var(--surface)', position:'sticky', top:0}}>
                            <tr>
                              <th style={{textAlign:'left', padding:'8px', borderBottom:'1px solid var(--border)', color:'var(--muted)'}}>Step</th>
                              <th style={{textAlign:'left', padding:'8px', borderBottom:'1px solid var(--border)', color:'var(--muted)'}}>ACTION</th>
                              <th style={{textAlign:'left', padding:'8px', borderBottom:'1px solid var(--border)', color:'var(--muted)'}}>Rule / Symbol</th>
                              <th style={{textAlign:'left', padding:'8px', borderBottom:'1px solid var(--border)', color:'var(--muted)'}}>Parse Stack</th>
                            </tr>
                          </thead>
                          <tbody>
                            {result.parseTable.map((d, i) => {
                              const actionColor = d.action === 'SHIFT' ? 'var(--accent2)' : 
                                                d.action === 'REDUCE' ? 'var(--accent3)' : 
                                                d.action === 'ACCEPT' ? 'var(--accent)' : 'var(--muted)';
                              return (
                                <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                                  <td style={{padding:'6px 8px', color:'var(--muted)'}}>{i+1}</td>
                                  <td style={{padding:'6px 8px', color: actionColor, fontWeight:600}}>{d.action}</td>
                                  <td style={{padding:'6px 8px', color:'var(--accent3)', fontFamily:'var(--mono)', fontSize:11}}>
                                    {d.rule || d.symbol || '—'}
                                  </td>
                                  <td style={{padding:'6px 8px', color:'var(--accent2)', fontFamily:'var(--mono)', fontSize:10, maxWidth:300, overflow:'auto'}}>
                                    {d.stack || '[ $ ]'}
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      )
                    }
                    <div className="tac-section-title" style={{marginTop:20}}>Derivation Summary</div>
                    <div style={{fontSize:12, color:'var(--text)', lineHeight:1.8}}>
                      {result.parseTable && result.parseTable.length > 0 ? (
                        <>
                          <div style={{marginBottom:8}}>
                            <strong style={{color:'var(--accent2)'}}>Shift Operations:</strong> {result.parseTable.filter(d => d.action === 'SHIFT').length}
                          </div>
                          <div style={{marginBottom:8}}>
                            <strong style={{color:'var(--accent3)'}}>Reduce Operations:</strong> {result.parseTable.filter(d => d.action === 'REDUCE').length}
                          </div>
                          <div>
                            <strong style={{color:result.parseTable.some(d => d.action === 'ACCEPT') ? 'var(--accent)' : 'var(--error)'}}>
                              Status: {result.parseTable.some(d => d.action === 'ACCEPT') ? '✓ ACCEPTED' : '✗ REJECTED'}
                            </strong>
                          </div>
                        </>
                      ) : (
                        <div style={{color:'var(--muted)'}}>No parse trace available.</div>
                      )}
                    </div>
                  </div>
                )}

                {/* SYMBOL TABLE */}
                {activeTab==='sym' && (
                  <div>
                    <div className="tac-section-title">Symbol Table</div>
                    {result.includes?.length>0 && (
                      <div style={{marginBottom:12}}>
                        <div className="tac-section-title">Included Libraries</div>
                        {result.includes.map((inc,i)=>(
                          <div key={i} style={{fontSize:12,padding:'3px 0',color:'var(--accent3)'}}>
                            {inc.directive} {inc.lib && <span className="tag tag-ok">{inc.lib}</span>}
                          </div>
                        ))}
                      </div>
                    )}
                    <table className="sym-table">
                      <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Scope</th><th>Value/Init</th><th>Status</th></tr></thead>
                      <tbody>
                        {result.symTable.map(s=>(
                          <tr key={s.id}>
                            <td style={{color:'var(--muted)'}}>{s.id}</td>
                            <td className="sym-type">{s.name}</td>
                            <td style={{color:'var(--accent3)'}}>{s.dataType}</td>
                            <td className="sym-scope">{s.scope}</td>
                            <td className="sym-val">{s.value}</td>
                            <td><span className={s.status==='ok'?'sym-ok':'sym-err'}>{s.status==='ok'?'✓':'✗'}</span></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {result.warnings?.length>0 && (
                      <>
                        <div className="tac-section-title" style={{marginTop:16}}>Semantic Warnings</div>
                        <div className="err-list">
                          {result.warnings.map((w,i)=><div key={i} className="err-item warn"><div className="err-msg">{w.msg}</div></div>)}
                        </div>
                      </>
                    )}
                  </div>
                )}

                {/* TAC */}
                {activeTab==='tac' && (
                  <div>
                    <div className="tac-section-title">Unoptimized Three-Address Code</div>
                    <div className="tac-block">
                      {result.rawTAC.map((l,i) => renderTACLine(l,i))}
                    </div>
                    <div className="tac-section-title" style={{marginTop:20}}>Optimized TAC (Constant Folding + Dead Code Elimination)</div>
                    <div className="tac-block">
                      {result.optTAC.map((l,i) => renderTACLine(l,i))}
                    </div>
                  </div>
                )}

                {/* ERRORS */}
                {activeTab==='errors' && (
                  <div>
                    <div className="tac-section-title">Lexical Errors ({result.lexErrors?.length||0})</div>
                    {result.lexErrors?.length===0
                      ? <div style={{color:'var(--accent)',fontSize:12}}>✓ No lexical errors.</div>
                      : <div className="err-list">{result.lexErrors.map((e,i)=><div key={i} className="err-item"><div className="err-loc">Line {e.line}, Col {e.col}</div><div className="err-msg">{e.msg}</div></div>)}</div>
                    }
                    <div className="tac-section-title">Parse Errors ({result.parseErrors?.length||0})</div>
                    {result.parseErrors?.length===0
                      ? <div style={{color:'var(--accent)',fontSize:12}}>✓ No parse errors.</div>
                      : <div className="err-list">{result.parseErrors.map((e,i)=>
                          <div key={i} className="err-item">
                            <div className="err-loc">Line {e.line}, Col {e.col}</div>
                            <div className="err-msg">{e.msg}</div>
                          </div>)}</div>
                    }
                    <div className="tac-section-title" style={{marginTop:16}}>Semantic Errors ({result.errors?.length||0})</div>
                    {result.errors?.length===0
                      ? <div style={{color:'var(--accent)',fontSize:12}}>✓ No semantic errors.</div>
                      : <div className="err-list">{result.errors.map((e,i)=>
                          <div key={i} className="err-item">
                            <div className="err-loc">Line {e.line||'?'}</div>
                            <div className="err-msg">{e.msg}</div>
                          </div>)}</div>
                    }
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      </div>

      {/* CFG Modal */}
      {showCFG && (
        <div className="modal-backdrop" onClick={()=>setShowCFG(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title">📜 Context-Free Grammar</span>
              <button className="close-btn" onClick={()=>setShowCFG(false)}>✕</button>
            </div>
            <div className="modal-body">
              <p style={{color:'var(--muted)',fontSize:11,marginBottom:16}}>
                CFG for C++ functions, expressions, I/O (cout/cin), and control flow.
                <br/>Terminals are shown in <span className="cfg-prod"><span className="t">orange</span></span>, non-terminals in <span className="cfg-prod"><span className="nt">blue</span></span>.
              </p>
              {CFG_RULES.map((r,i)=>(
                <div key={i} className="cfg-rule">
                  <span className="cfg-nt">{r.nt}</span>
                  <span className="cfg-arrow">→</span>
                  <span className="cfg-prod">
                    {r.prod.map((p,j)=>(
                      <span key={j}>
                        {p.split(/(\b[a-z_][a-z_]*\b|[A-Z][A-Za-z]+)/g).map((chunk,k)=> {
                          if (/^[A-Z][A-Za-z]+$/.test(chunk)) return <span key={k} className="nt">{chunk}</span>;
                          if (/^[a-z_]+$/.test(chunk) && !['ε','|'].includes(chunk)) return <span key={k} className="t">{chunk}</span>;
                          return <span key={k} style={{color:'var(--muted)'}}>{chunk}</span>;
                        })}
                        {j<r.prod.length-1 && ' '}
                      </span>
                    ))}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
